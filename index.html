<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kyle & Lyn RSVP</title>
    <style>
        @font-face {
            font-family: 'GreatVibes';
            src: url('fonts/GreatVibes-Regular.ttf') format('truetype');
        }
        @media (orientation: landscape) {
            body {
                overflow-x: hidden; 

            }

            html, body {
                margin: 0;
                padding: 0;
                height: 100%;
                background-color: #fdfaef;
            }


            .game {
                position: absolute;
                background-color: #FFFFFF;
                padding: 0;
                margin: 0;
                border: none;
                width: 50%;
                aspect-ratio: 16/9;
                z-index: 0;
                left: 0%;
                top: 45%;
            }


            .main-container {
                position: absolute;
                width: 100%;
                height: 100%;
                left: 10%;
                /*position: absolute;
                background-image: url('images/kylelyn.png');
                background-position: left center;
                background-size: contain;
                background-repeat: no-repeat;
                top: -5%;
                height: 110%;
                width: 100%;
                margin: 0;
                margin-left: 5%;
                z-index: 0;
                padding: 0;*/
            }

            #kylelyn
            {
                width: 50%;
                height: auto;
            }

            #rsvp {
                font-family: Garamond;
                text-align: center;
                margin: 0;
                font-size: 4vh;
                font-weight: bold;
                margin-top: 1%;
            }

            #rsvp-details {
                font-family: Garamond;
                width: 100%;
                margin: 3%;
                margin-top: 10%;
            }

            #weddingdetails {
                position: absolute;
                top: 1%;
                width: 25%;
                margin-left: 50%;
                font-size: 3vh;
                color: #a78e1f;
            }

            #invitation {
                font-family: Garamond;
                font: bold;
                color: #000000;
                font-size: 4vh;
                text-align: center;
                margin: 3%;
            }

            #names {
                font-family: 'GreatVibes', 'Brush Script MT';
                font-size: 10vh;
                text-align: center;
                width: 100%;
                margin: 10%;
                margin-left: 0;
            }

            #date {
                font-family: Garamond;
                font-weight: bold;
                margin: 3%;
                text-align: center;
            }

            #location {
                font-family: Garamond;
                font-weight: bold;
                color: #000000;
                width: 100%;
                text-align: center;
                margin: 3%;
            }

            .forminput {
                font-family: Garamond;
                width: 80%;
                height: 2.5vh;
                margin-left: 10%;
            }

            #rsvpdate {
                font-family: Garamond;
                font-weight: bold;
                margin: 3%;
                text-align: center;
            }

            #submitbutton {
                font-family: Garamond;
                font-weight: bold;
                font-size: 4vh;
                margin: 3%;
                text-align: center;
                width: 50%;
                height: 5vh;
                margin-left: 25%;
                border-color: #f1e9d2;
                background-color: #f1e9d2;
            }

            #responseMessage {
                font-family: Garamond;
                margin: 3%;
                text-align: center;
            }
        }

        @media (orientation: portrait) {
            body {
                font-family: 'GreatVibes';
                overflow: hidden; /* Prevents unwanted scrollbars */
            }

            html, body {
                margin: 0;
                padding: 0;
                height: 100%;
            }

            .game {
                position: absolute;
                bottom: 0%;
                left: 50%;
                transform: translateX(-50%);
                background-color: #FFFFFF;
                padding: 0;
                margin: 0;
                border: none;
                width: 90%;
                aspect-ratio: 16/9;
                z-index: 0;
            }

            .background-container {
                position: absolute;
                top: 5%;
                background-image: url('images/kylelyn.png');
                background-position: center center;
                background-size: contain;
                background-repeat: no-repeat;
                width: 100%;
                height: 70vh;
                margin: 0;
                z-index: 0;
            }

            #invitedtext {
                top: 10%;
                text-align: center;
                width: 50%;
                margin-inline: auto;
                font-size: 4vh;
                margin-bottom: 0%;
                margin-top: 0.5%;
            }

            #rsvp-details {
                width: 50vw;
                margin: 0 auto;
                margin-left: 1%;
                z-index: 100;
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <img id="kylelyn" src="images/kylelyn.png" />
        <iframe class="game"
                src="game/index.html">
        </iframe>

        <div id="weddingdetails">
            <p id="rsvp">RSVP</p>
            <p id="invitation">We would be delighted if you could celebrate with us at</p>
            <p id="names">Kyle & Lyn's Wedding</p>
            <p id="date">SEPTEMBER 22, 2026 | 5:00 PM </p>
            <p id="location">Batou Church, Catanduanes, Philippines</p>
            <form id="rsvp-details">
                <p id="rsvpdate"> Please RSVP by August 15th </p>
                <input class="forminput"type="text" name="name" placeholder="Name"><br>
                <input class="forminput"type="text" name="guests" placeholder="Number of Guests"><br>
                <input class="forminput"type="text" name="email"placeholder="Email"><br>
                <button id ="submitbutton" type="submit">Send</button>
                <p id="responseMessage">---</p>
            </form>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxEm31yzUd-to70GD4k910NY1RyoyefP7Re9xXRLu_EHTzDIvRgEWI9UklnD67SogKIlg/exec';
        const form = document.getElementById('rsvp-details');
        const responseMessage = document.getElementById('responseMessage');

        form.addEventListener('submit', e => {
            e.preventDefault(); // Stop default form redirect page behavior
            responseMessage.innerHTML = "Submitting...";

            fetch(scriptURL, { method: 'POST', body: new FormData(form) })
                .then(response => {
                    responseMessage.innerHTML = "Info received!";
                    form.reset();
                })
                .catch(error => {
                    responseMessage.innerHTML = "An error occurred. Please try again or contact us directly.";
                    console.error('Error!', error.message);
                });
        });
    </script>
</body>
</html>
