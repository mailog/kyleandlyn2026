            /*#arch {

        }

        @media (orientation: portrait) {
            body {
                overflow-x: hidden;
                background-color: #fafafa;
            }

            html, body {
                margin: 0;
                padding: 0;
                height: 100%;
            }


            .game {
                position: fixed;
                background-color: #FFFFFF;
                bottom: 0;
                padding: 0;
                margin: 0;
                border: none;
                width: 75%;
                margin-left: 12.5%;
                aspect-ratio: 16 / 9;
                z-index: 0;
                left: 0;
            }


            .main-container {
                position: absolute;
                width: 100%;
                height: 100%;
                left: 0%;
            }

            #kylelyn {
                position:fixed;
                width: 70%;
                height: auto;
                left: 15%;
                top: 2.5%;
            }

            #rsvp {
                font-family: Garamond;
                text-align: center;
                margin: 0;
                font-size: 1rem;
                font-weight: bold;
                margin-top: 1%;
            }

            #rsvp-details {
                font-family: Garamond;
                width: 100%;
            }

            #weddingdetails {
                position: absolute;
                left: 15%;
                top: 27.5%;
                width: 70%;
                height: auto;
                font-size: 1.5rem;
                color: #8D5EB7;
                background-color: #FFFFFFBF;
                border-radius: 12px;
                border-color: #8D5EB7;
                border-width: 1px;
                border-style: ridge;
                margin: 0;
            }

            #invitation {
                font-family: Garamond;
                font: bold;
                color: #000000;
                font-size: 1rem;
                text-align: center;
                margin: 1%;
            }

            #names {
                font-family: 'GreatVibes', 'Brush Script MT';
                font-size: 1.75rem;
                text-align: center;
                width: 100%;
                margin: 1.5%;
                margin-left: 0;
            }

            #date {
                font-family: Garamond;
                font-weight: bold;
                margin: 1%;
                text-align: center;
                font-size: 1rem;
            }

            #location {
                font-family: Garamond;
                font-weight: bold;
                color: #000000;
                width: 100%;
                text-align: center;
                margin: 1%;
                font-size: 0.9rem;
            }

            .forminput {
                font-family: Garamond;
                width: 60%;
                height: 0.75rem;
                margin: 0;
                margin-left: 20%;
                display:flex;
                gap: 0;
            }

            #rsvpdate {
                font-family: Garamond;
                font-weight: bold;
                margin: 0%;
                text-align: center;

            }

            #submitbutton {
                font-family: Garamond;
                font-weight: bold;

                background-repeat: repeat-x;

                left: 0;

                /*background-size: cover;
                background-position: center;
                background-repeat: no-repeat;
                background-attachment: fixed;*/
            }

</head>
<body>
    <div id="flowers"></div>
    <div id="arch"></div>
    <div class="main-container">
        <img id="kylelyn" src="images/kylelyn.png" />
        <iframe class="game"
                src="game/index.html">
        </iframe>

        <div id="weddingdetails">
            <p id="rsvp">RSVP</p>
            <!--<p id="invitation">We would be delighted if you could celebrate with us at</p>-->
            <p id="names">Kyle & Lyn's Wedding</p>
            <p id="date">SEPTEMBER 22, 2026 | 5:00 PM </p>
            <p id="location">St. John the Baptist Church, Bato, Catanduanes, Philippines</p>
            <form id="rsvp-details">
                <p id="rsvpdate">Please respond to this RSVP by August the 22nd</p>
                <input class="forminput" type="text" name="name" placeholder="Name" maxlength="50" required pattern="[A-Za-z\s'-]{1,100}">
                <input class="forminput" type="number" name="guests" placeholder="Number of Guests" maxlength="50" required pattern="[A-Za-z\s'-]{1,100}">
                <input class="forminput" type="email" name="email" placeholder="Email" maxlength="50" required>
                <input class="forminput" type="tel" name="phonenumber" placeholder="Phone Number" maxlength="15" required pattern="[A-Za-z\s'-]{1,100}">
                <input class="forminput" type="text" name="allergies" placeholder="Food Allergies" maxlength="50" pattern="[A-Za-z\s'-]{1,100}">
                <button id="submitbutton" type="submit">Send</button>
                <p id="responseMessage">---</p>
            </form>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbyvPKfb4tKdz0eCJqcuGAEt5bWSansD7bpz1nyRrIbopTwCdlosjtO7p74wC3wClnDA/exec';
        const form = document.getElementById('rsvp-details');
        const responseMessage = document.getElementById('responseMessage');

        form.addEventListener('submit', e => {
            e.preventDefault(); // Stop default form redirect page behavior
            responseMessage.innerHTML = "Submitting...";

            fetch(scriptURL, { method: 'POST', body: new FormData(form) })
                .then(response => {
                    const button = document.getElementById("submitbutton");
                    button.disabled = true;
                    responseMessage.innerHTML = "Info received!";
                    form.reset();
                })
                .catch(error => {
                    responseMessage.innerHTML = "An error occurred. Please try again or contact us directly.";
                    console.error('Error!', error.message);
                });
        });
    </script>
</body>
