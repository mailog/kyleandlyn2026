        }

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        .game {
            position: absolute;
            bottom: -35%; /* Sticks it to the bottom edge */
            left: 50%; /* Moves its left edge to the middle of the parent */
            transform: translateX(-50%); /* Pulls it back by half its own width */
            background-color: #FFFFFF; /* Optional: Adds a color to the empty side bars */
            padding: 0;
            margin: 0;
            border:none;
        }
        .background-container {
            background-image: url('images/kylelyn.png');
            background-position: center center;
            background-size: contain; /* Forces the entire image to fit inside the screen */
            background-repeat: no-repeat;
            width: 100%;
            height: 90vh;
            margin:0;
            background-color: #FFFFFF; /* Optional: Adds a color to the empty side bars */
        }

        #invitedtext {
            top: 10%;
            text-align: center;
            width: 50%; /* Or a fixed width like 300px */
            margin-inline: auto;
            font-family: 'Lucida Bright';
            font-size: 4vh;
            margin-bottom: 1%;
        }

        .rsvp-details
        {
            position: absolute;
            left: 75%;
            width: 25%;
            top: 5%;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <p id="invitedtext">YOU'RE INVITED!</p>
    <div class="background-container">
    </div>
    <iframe class="game"
                src="game/index.html"
                width="740"
                height="500">
        </iframe>
    
    <form class="rsvp-details">
        <p> Details: </p>
        <label for="fname">First name:</label><br>
        <input type="text" id="fname" name="fname"><br>
        <label for="lname">Last name:</label><br>
        <input type="text" id="lname" name="lname">
    </form>
</body>
