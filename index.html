<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Static Web Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f4f4f4;
            color: #333;
        }

        header {
            background: #0078d7;
            color: white;
            text-align: center;
            padding: 2rem;
        }

        main {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .card {
            background: white;
            padding: 1.5rem;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        footer {
            text-align: center;
            padding: 1rem;
            margin-top: 2rem;
            color: #666;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to My Website</h1>
        <p>A simple static web page</p>
    </header>

    <main>
        <div class="card">
            <h2>Hello World!</h2>
            <p>
                This is a basic static HTML page with embedded CSS.
                You can customize the content, colors, and layout as needed.
            </p>
            <button onclick="alert('Button clicked!')">
                Click Me
            </button>
        </div>
    </main>

    <footer>
        &copy; 2026 My Website
    </footer>
</body>
</html>
